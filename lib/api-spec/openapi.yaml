openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Enterprise Management System - ERP/HRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: tasks
    description: Task management
  - name: attendance
    description: Attendance tracking
  - name: leave
    description: Leave management
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks (filtered by role)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: assigneeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task (manager+ only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task (manager+ only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks/{id}/status:
    put:
      operationId: updateTaskStatus
      tags: [tasks]
      summary: Update task status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/messages:
    get:
      operationId: getTaskMessages
      tags: [tasks]
      summary: Get messages for a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskMessage"
    post:
      operationId: sendTaskMessage
      tags: [tasks]
      summary: Send a message on a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskMessage"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance record
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today's attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/check-in:
    post:
      operationId: checkIn
      tags: [attendance]
      summary: Employee check-in
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "400":
          description: Already checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendance/check-out:
    post:
      operationId: checkOut
      tags: [attendance]
      summary: Employee check-out
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutRequest"
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "400":
          description: Not checked in or already checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: string
            description: "YYYY-MM format"
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /leave/balance:
    get:
      operationId: getLeaveBalance
      tags: [leave]
      summary: Get leave balance for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Leave balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveBalance"

  /leave:
    get:
      operationId: listLeaveRequests
      tags: [leave]
      summary: List leave requests (own for employee, all for manager/hr)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: createLeaveRequest
      tags: [leave]
      summary: Submit a leave request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaveRequest"
      responses:
        "201":
          description: Leave request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/{id}/status:
    put:
      operationId: updateLeaveStatus
      tags: [leave]
      summary: Approve or reject leave request (manager/hr only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeaveStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get role-based dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, special_manager, manager, hr, employee]
        department:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - username
        - fullName
        - role
        - isActive
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, special_manager, manager, hr, employee]
        department:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required:
        - username
        - password
        - fullName
        - role

    UpdateUserRequest:
      type: object
      properties:
        password:
          type: string
          nullable: true
        fullName:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, special_manager, manager, hr, employee]
          nullable: true
        department:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
          nullable: true

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [new, sent, received, in_progress, in_review, revision, done, approved, closed]
        deadline:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        createdBy:
          $ref: "#/components/schemas/UserSummary"
        checklistTotal:
          type: integer
        checklistDone:
          type: integer
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - priority
        - status
        - assignees
        - createdBy
        - checklistTotal
        - checklistDone
        - messageCount
        - createdAt
        - updatedAt

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          properties:
            checklist:
              type: array
              items:
                $ref: "#/components/schemas/ChecklistItem"
          required:
            - checklist

    ChecklistItem:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        isDone:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - text
        - isDone
        - sortOrder

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        role:
          type: string
        department:
          type: string
          nullable: true
      required:
        - id
        - fullName
        - role

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, urgent]
        deadline:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        assigneeIds:
          type: array
          items:
            type: integer
        checklist:
          type: array
          items:
            type: string
      required:
        - title
        - priority
        - assigneeIds

    UpdateTaskStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [sent, received, in_progress, in_review, revision, done, approved, closed]
        note:
          type: string
          nullable: true
      required:
        - status

    TaskMessage:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        senderId:
          type: integer
        senderName:
          type: string
        senderRole:
          type: string
        content:
          type: string
        fileUrl:
          type: string
          nullable: true
        fileType:
          type: string
          nullable: true
        fileName:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - taskId
        - senderId
        - senderName
        - senderRole
        - content
        - createdAt

    CreateMessageRequest:
      type: object
      properties:
        content:
          type: string
        fileUrl:
          type: string
          nullable: true
        fileType:
          type: string
          nullable: true
        fileName:
          type: string
          nullable: true
      required:
        - content

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        date:
          type: string
        checkInTime:
          type: string
          nullable: true
        checkInLat:
          type: number
          nullable: true
        checkInLng:
          type: number
          nullable: true
        checkOutTime:
          type: string
          nullable: true
        checkOutLat:
          type: number
          nullable: true
        checkOutLng:
          type: number
          nullable: true
        isLate:
          type: boolean
        isEarlyLeave:
          type: boolean
        workHours:
          type: number
          nullable: true
      required:
        - id
        - userId
        - userName
        - date
        - isLate
        - isEarlyLeave

    CheckInRequest:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        deviceInfo:
          type: string
          nullable: true
      required:
        - latitude
        - longitude

    CheckOutRequest:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
      required:
        - latitude
        - longitude

    LeaveRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        type:
          type: string
          enum: [annual, hourly, unpaid, medical, mission]
        startDate:
          type: string
        endDate:
          type: string
          nullable: true
        hours:
          type: number
          nullable: true
        reason:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        managerNote:
          type: string
          nullable: true
        fileUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - userId
        - userName
        - type
        - startDate
        - reason
        - status
        - createdAt

    CreateLeaveRequest:
      type: object
      properties:
        type:
          type: string
          enum: [annual, hourly, unpaid, medical, mission]
        startDate:
          type: string
        endDate:
          type: string
          nullable: true
        hours:
          type: number
          nullable: true
        reason:
          type: string
        fileUrl:
          type: string
          nullable: true
      required:
        - type
        - startDate
        - reason

    UpdateLeaveStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
        managerNote:
          type: string
          nullable: true
      required:
        - status

    LeaveBalance:
      type: object
      properties:
        totalDays:
          type: number
        usedDays:
          type: number
        remainingDays:
          type: number
        pendingDays:
          type: number
      required:
        - totalDays
        - usedDays
        - remainingDays
        - pendingDays

    Notification:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        type:
          type: string
        referenceId:
          type: integer
          nullable: true
        referenceType:
          type: string
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - body
        - type
        - isRead
        - createdAt

    DashboardData:
      type: object
      properties:
        role:
          type: string
        todayTasks:
          type: integer
        pendingTasks:
          type: integer
        overdueTasks:
          type: integer
        completedTasks:
          type: integer
        presentToday:
          type: integer
          nullable: true
        absentToday:
          type: integer
          nullable: true
        pendingLeaves:
          type: integer
        todayLate:
          type: integer
          nullable: true
        myCheckIn:
          type: string
          nullable: true
        myCheckOut:
          type: string
          nullable: true
        leaveBalance:
          type: number
        unreadNotifications:
          type: integer
        totalEmployees:
          type: integer
          nullable: true
      required:
        - role
        - todayTasks
        - pendingTasks
        - overdueTasks
        - completedTasks
        - pendingLeaves
        - leaveBalance
        - unreadNotifications
